apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.17.2
          env:
            - name: VAULT_ADDR
              value: "http://vault-service.vault.svc.cluster.local:8200"
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Vault to be ready..."
              until vault status -address=$VAULT_ADDR; do
                echo "Vault not ready, waiting..."
                sleep 5
              done
              
              if ! vault operator init -address=$VAULT_ADDR -key-shares=5 -key-threshold=3 > /vault/init/keys.txt; then
                echo "Vault might already be initialized"
                exit 0
              fi
              
              echo "Vault initialized successfully"
              echo "Root token and unseal keys saved to /vault/init/keys.txt"
          volumeMounts:
            - name: vault-init-data
              mountPath: /vault/init
      volumes:
        - name: vault-init-data
          emptyDir: {}
