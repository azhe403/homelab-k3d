apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.17.2
          env:
            - name: VAULT_ADDR
              value: "http://vault-service.vault.svc.cluster.local:8200"
          command:
            - /bin/sh
            - -c
            - |
              echo "Initializing Vault (retries until API is reachable)..."
              while true; do
                if vault operator init -address=$VAULT_ADDR -key-shares=5 -key-threshold=3 > /vault/init/keys.txt 2> /vault/init/init.err; then
                  echo "Vault initialized successfully"
                  KEY1="$(awk -F': ' '/Unseal Key 1:/ {print $2}' /vault/init/keys.txt)"
                  KEY2="$(awk -F': ' '/Unseal Key 2:/ {print $2}' /vault/init/keys.txt)"
                  KEY3="$(awk -F': ' '/Unseal Key 3:/ {print $2}' /vault/init/keys.txt)"

                  vault operator unseal -address=$VAULT_ADDR "$KEY1"
                  vault operator unseal -address=$VAULT_ADDR "$KEY2"
                  vault operator unseal -address=$VAULT_ADDR "$KEY3"

                  exit 0
                fi

                if grep -qi "already.*initialized" /vault/init/init.err; then
                  echo "Vault already initialized"
                  exit 0
                fi

                echo "Vault not ready, waiting..."
                sleep 5
              done
          volumeMounts:
            - name: vault-init-data
              mountPath: /vault/init
      volumes:
        - name: vault-init-data
          emptyDir: {}
