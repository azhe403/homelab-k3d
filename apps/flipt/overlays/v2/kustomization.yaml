apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flipt-v2

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: docker.flipt.io/flipt/flipt:v2
  target:
    kind: Deployment
    name: flipt
- patch: |-
    - op: replace
      path: /spec/tls/0/hosts/0
      value: flipt.azhe.my.id
    - op: replace
      path: /spec/rules/0/host
      value: flipt.azhe.my.id
  target:
    kind: Ingress
    name: flipt-ingress
