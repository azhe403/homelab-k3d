apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rancher-data-pvc
  namespace: cattle-system
  labels:
    app: rancher
    app.kubernetes.io/name: rancher
    app.kubernetes.io/component: management
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
