apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: rancher
  namespace: cattle-system
spec:
  interval: 5m
  chart:
    spec:
      chart: rancher
      version: "2.9.1"
      sourceRef:
        kind: HelmRepository
        name: rancher-stable
        namespace: cattle-system
  valuesFrom:
  - kind: ConfigMap
    name: rancher-values
    valuesKey: values.yaml
