apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-altodo-student-mgmt
  namespace: argocd
  labels:
    app.kubernetes.io/name: dev-altodo-student-mgmt
    app.kubernetes.io/component: application
spec:
  project: default
  source:
    repoURL: https://gitlab.com/azcorp-dev/altodo/student-management/gitops-student-management.git
    targetRevision: main
    path: k8s/overlays/development
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-altodo-student-mgmt
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
