apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-root
    app.kubernetes.io/component: bootstrap
spec:
  project: default
  source:
    repoURL: https://github.com/azhe403/homelab-k3d.git
    targetRevision: HEAD
    path: clusters/k3d
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
