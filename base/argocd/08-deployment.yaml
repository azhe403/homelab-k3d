apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-server
    spec:
      serviceAccountName: argocd-server
      containers:
        - name: argocd-server
          image: quay.io/argoproj/argocd:v2.8.4
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          command:
            - argocd-server
          args:
            - --insecure
            - --staticassets
            - /shared/app
            - --repo-server
            - argocd-repo-server:8081
            - --repo-server-timeout-seconds
            - "300"
            - --dex-server
            - http://argocd-dex-server:5556
          env:
            - name: ARGOCD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: argocd-cm
              mountPath: /etc/argocd/config/argocd-cm
              subPath: argocd-cm
      volumes:
        - name: argocd-cm
          configMap:
            name: argocd-cm
            optional: true
