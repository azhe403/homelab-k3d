# Arcane Docker Compose Configuration
# Generated at 4/2/2026, 9:52:23 PM

services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    ports:
      - 3552:3552
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - arcane-data:/app/data
    environment:
      - APP_URL=http://localhost:3552
      - PUID=1000
      - PGID=1000
      - ENCRYPTION_KEY=46f75ada66af69c6ebed48a6ca500523191f01e85c57daddb55bc555d0c7fe43
      - JWT_SECRET=b3dbd41cf7920de17c263f36f9446165e6362852d7615fc4342e0a4004e1a8ac
      - LOG_LEVEL=info
      - LOG_JSON=false
      - POSTGRES_DB=arcane
      - POSTGRES_USER=arcane
      - OIDC_ENABLED=false
      - DATABASE_URL=postgresql://arcane:changeme@postgres:5432/arcane
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: arcane-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=arcane
      - POSTGRES_USER=arcane
      - POSTGRES_PASSWORD=changeme
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 5432:5432

volumes:
  arcane-data:
    driver: local
  postgres-data:
    driver: local